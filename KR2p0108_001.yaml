body:
  text: 武威漢簡丙本喪服釋文喪服斬衰常苴絰杖絞帶冠繩纓菅屢者父諸侯為天子君父為長子為人後者妻為夫妾為君女子子在室為父布總晉笄衰三年子嫁反在父之室為父三年公士大夫之衆臣為其君布帶繩屢疏衰常牡麻絰冠布纓削杖布帶疏屢三年者父卒則為母繼母如母慈母如母母為長子疏衰常齊牡麻絰冠布纓削杖布帶疏屢期者父在為母妻出妻之子為母父卒繼母嫁從為之服報不杖麻屢者祖父母世父母叔父母大夫之適子為妻昆弟為衆子昆弟之子大夫之庶子為適昆弟適孫為人後者為其父母報女子子適人者為其父母昆弟之為父後者繼父同居者為夫之君姑姊妹女子子適人無主者姑姊妹報為君之父母妻長子祖父母妾為女君婦為舅姑夫之昆弟之子公妾大夫之妾為其子女子子為祖父母大夫之子為世父母叔父母子昆弟昆弟之子姑姊妹女子子無主為大夫命婦者唯子不報大夫為祖父母適孫為士者公妾以及士妾為其父母疏衰常齊牡麻絰無綬者寄公為所禺丈夫婦人為宗子宗子之母妻為舊君君之母妻庶人為國君大夫在外其妻長子為舊國君繼父不同居曾祖父母大夫為宗子舊君曾祖父母為士者如衆人女子子嫁者未嫁者為曾祖父母大功布衰常牡麻絰無綬者子女子女子子之長中叔父之長中姑姊姑之長中昆弟之長中夫之昆弟之子女子子之長中適孫之長中大夫之庶子為適昆弟之長中公為適子之長中大夫為適子之長中其長皆九月纓絰其中七月不纓絰大功布衰常帶牡麻絰纓布帶三月受以小功衰即葛九月姑姊妹女子子適人者從父昆弟為人後者為其昆弟庶孫適婦女子子適人者為衆昆弟絰丈夫婦人夫之祖父母世父母叔父母大夫為世父母叔父母子昆弟昆弟之子為士者公之庶昆弟大夫之庶子為母妻昆弟皆為其從父昆弟之為大夫者為夫之昆弟之婦人子適人者大夫之妾為君之庶子女子子嫁者未嫁者為世父母叔父母姑姊妹大夫大夫之妻大夫之子公之昆弟為姑姊妹女子子嫁於大夫者君為姑姊妹女子子嫁於國君者繐衰常牡麻絰溉葬除之者諸侯之大夫為天子小功布衰常麻帶絰五月者叔父之下適孫之下昆弟之下大夫之庶子為適昆弟之下為姑姊妹女子子之下為人後者為其昆弟從父昆弟之長為夫之叔父之長昆弟之子女子子夫之昆弟之子女子子之下為絰庶孫丈夫婦人之長大夫公之昆弟大夫之子為其昆弟庶子姑姊妹女子子之長大夫之妾為庶子之長小功布衰常即葛五月者從祖祖父母從祖父母報從祖昆弟從父姊妹孫適人者為人後為其姊妹適人者為外祖父母從母丈夫婦人報夫之姑姊妹弟似婦報大夫大夫之子公之昆弟為從父昆弟庶孫姑姊妹女子子適士者大夫之妾為庶子適人者庶婦君母之父母從母君子子為庶母慈己者緦麻三月者族祖父母族父母族昆弟庶孫之婦庶孫之中從祖姑姊妹適人者報從祖父從祖昆弟之長外孫從父昆弟絰之下夫之叔父之中下從母之長報庶子為後為其母士為庶母貴臣貴妾乳母從祖昆弟之子曾孫父之姑從母昆弟甥聟妻之父母姑之子䓘䓘之子夫之姑姊妹之長夫之諸祖父母報君母之昆弟從父昆弟之子之長昆弟之孫之長為夫之從父昆弟之妻公子為其母練冠麻麻衣縓緣為其妻縓冠葛麻衣縓緣皆溉葬除之大夫公之昆弟大夫之子於兄弟降一等為人後者於兄弟降一等報於所為後之兄弟若子兄弟皆在也國駕一等不及知父母與兄弟居駕一等崩友皆在也國但免歸則已朋友麻君之所為兄弟服室老降一等夫之所為兄弟服妻降一等庶子為後為其外祖父母從母䓘無服不為後如國人宗子孤為大功衰小功衰皆三月親則月算如國人改葬緦童子唯堂室緦凡妾為私兄弟如國人大夫弔於命婦錫衰命婦弔於大夫錫衰女子子適人者為父母婦為䓘姑惡笄有首以卒哭子折笄首以笄布總妾為女君君之長子惡笄有首布總凡衰外削幅常內削幅幅三絇若齊常內衰外負廣出於適寸適博四寸出於衰衰長六寸博四寸衣帶下尺衽二尺有五寸袂屬幅衣二尺二寸袪尺二寸衰三升三升有半其冠六升以其冠為綬綬冠七升齊衰四升其冠七升以其冠為綬綬冠八升繐衰四升有半其冠八升大功八升若九升小功十升若十一升凡千四百七十二字
